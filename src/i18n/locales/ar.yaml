# What Google is doing
 what_heading: "ما الذي تفعله جوجل؟"
 what_intro: "في أغسطس 2025، أعلنت جوجل [عن](https://developer.android.com/developer-verification) متطلب جديد: بدءًا من سبتمبر 2026، **يجب على كل مطور تطبيقات أندرويد التسجيل مركزيًا مع جوجل** قبل أن يمكن تثبيت برمجياتهم على أي جهاز. ليس فقط تطبيقات متجر بلاي: جميع التطبيقات. يشمل هذا التطبيقات المشتركة بين الأصدقاء، والموزعة عبر [F-Droid](https://f-droid.org)، والمبنية بواسطة الهواة للاستخدام الشخصي. المطورون المستقلون، والمجموعات الكنسية والمجتمعية، والهواة على حد سواء سيتم منعهم من القدرة على تطوير وتوزيع برمجياتهم."
 what_registration: "التسجيل يتطلب:"
 what_req_fee: "دفع رسوم لجوجل"
 what_req_terms: "الموافقة على شروط وأحكام جوجل"
 what_req_id: "تسليم هويتك الصادرة عن الحكومة"
 what_req_signing: "Providing evidence of your private signing key"
 what_req_appids: "عرض جميع معرفات التطبيقات الحالية والمستقبلية"
 what_pullquote: "إذا لم يمتثل المطور، سيتم حظر تطبيقاته بصمت على كل جهاز أندرويد حول العالم."

# Who this hurts
 impact_heading: "هذا سيؤذي من؟"
 impact_you_heading: "أنت"
 impact_you_p1: "لقد اشتريت هاتف أندرويد لأن جوجل أخبرتك أنه مفتوح. كان بإمكانك تثبيت ما تريد، وكان هذا هو الاتفاق."
 impact_you_p2: "جوجل تقوم الآن بإعادة كتابة تلك الصفقة بأثر رجعي على الأجهزة التي تمتلكها بالفعل. بعد وصول التحديث، يمكنك فقط تشغيل البرامج التي وافقت جوجل عليها مسبقًا. على هاتفك: *ملكك*، الذي *دفعت ثمنه*"
 impact_dev_heading: "المطورون المستقلون"
 impact_dev_p1: "أول تطبيق لشاب، أداة خصوصية لمتطوع، أو نسخة تجريبية داخلية سرية لشركة. لا يهم. بعد سبتمبر 2026، لا يمكن تثبيت أي من هذه دون موافقة جوجل."
 impact_dev_p2: "[F-Droid](https://f-droid.org)، الموطن لآلاف تطبيقات أندرويد المجانية والمفتوحة المصدر، وصف هذا بأنه ["تهديد وجودي"](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). يسميه كوري دكتوروف ["دارث أندرويد"](https://pluralistic.net/2025/09/01/fulu/)."
 impact_gov_heading: "الحكومات والمجتمع المدني"
 impact_gov_p1: "لدى جوجل [سجل موثق](https://www.aclu.org/news/free-speech/app-store-oligopoly) في الامتثال عندما تطلب الأنظمة الاستبدادية إزالة التطبيقات. مع هذا البرنامج، ستظل البرمجيات التي تُشغل مؤسسات بلدك قائمة وفقًا لإرادة شركة أجنبية واحدة غير خاضعة للمساءلة."
 impact_gov_p2: "تصف [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) عملية التحكم في التطبيقات بأنها "مسار متسع باستمرار للرقابة على الإنترنت"."

# Advanced flow
 flow_heading: "الـ \"فتحة الهروب\" الخاصة بجوجل هي باب فخ"
 flow_intro: "تقول جوجل إن "المستخدمين المتمرسين" [يمكنهم تثبيت](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) التطبيقات غير الموثقة. إليكم كيف يبدو ذلك *فعليًا*:"
 flow_step1: "تعمق في إعدادات النظام، وابحث عن خيارات المطور"
 flow_step2: "اضغط على رقم الإصدار <strong>سبع مرات</strong> لتمكين وضع المطور"
 flow_step3: "تجاهل شاشات الخوف حول الإكراه"
 flow_step4: "أدخل كلمة السر"
 flow_step5: "أعد تشغيل الجهاز"
 flow_step6: "<strong>أنتظر 24 ساعة</strong>"
 flow_step7: "عُدْ، وأزل المزيد من شاشات الخوف"
 flow_step8: "أختر \"السماح مؤقتاً\" (7 أيام) أو \"السماح بلا حدود\""
 flow_step9: "أكد مرة أخرى أنك تفهم\"المخاطر\""
 flow_summary: "تسع خطوات. فترة تبريد إلزامية لمدة 24 ساعة. *لتثبيت البرامج على جهاز تملكه.*"
 flow_detail: "والأسوأ: هذه العملية تعمل بالكامل من خلال **خدمات جوجل بلاي**، وليس نظام أندرويد. يمكن لجوجل تغييرها أو تشديدها أو إنهاؤها في أي وقت، دون الحاجة إلى تحديث النظام ودون الحاجة إلى موافقة. وحتى اليوم، لم يتم إصدارها في أي نسخة تجريبية أو معاينة أو إصدار تجريبي canary. إنها موجودة فقط كمقالة مدونة وبعض النماذج الأولية."

# Precedent
 precedent_heading: "هذا أكبر من أندرويد"
 precedent_pullquote: "إذا كان بإمكان جوجل أن تغلق بأثر رجعي مليارات الأجهزة التي تم بيعها كمنصات مفتوحة، فإن كل مصنع للأجهزة على الكوكب يراقب."
 precedent_p1: "المبدأ الذي يتم إرساؤه: **الشركة التي صنعت جهازك هي التي تقرر، بعد أن تشتريه، أي البرامج مسموح لك بتشغيلها.** في عالم البرمجيات، يُسمى هذا "سحب البساط"؛ لكن على الأقل كان بإمكانك دائمًا تثبيت برامج منافسة. أما في الأجهزة، فهو *أمر واقع* يجردك من قدرتك ويجعلك تنخضع أمام أهواء وصي واحد غير مسؤول واحتكاري مدان."
 precedent_p2: "إنفتاح أندرويد لم يكن يومًا مجرد ميزة. لقد كان *الوعد* الذي ميّزه عن الآيفون. اختار الملايين أندرويد لهذا السبب بالذات. جوجل الآن تلغي هذا الوعد من جانب واحد، على الأجهزة *التي هي بالفعل* في جيوب الناس، لأنهم قرروا أن لديهم سيطرة كافية على السوق وتأثيرًا تنظيميًا يسمح لهم بالقيام بذلك."
 precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *"غيرة جوجل من أبل تهدد بتفكيك الإرث المفتوح لنظام أندرويد.""

# Objections
 objections_heading: "لكن انتظر، أليس هذا..."
 obj_security_q: "\"...فقط عن الأمان؟\""
 obj_security_a: "مبرر الأمن هو مجرد ستار دخاني. يقوم Google Play Protect بالفعل بفحص البرمجيات الضارة بغض النظر عن هوية المطور. طلب بطاقة هوية حكومية لا يجعل الكود أكثر أمانًا. بل يجعل *المطورين* قابلين للتحديد والمراقبة. يمكن لمؤلفي البرمجيات الضارة التسجيل. غالبًا ما لا يستطيع المطورون المستقلون والمعارضون ذلك. [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) صريحة: التحكم في الوصول بناءً على الهوية هو أداة للرقابة، وليس للأمن."
 obj_sideloading_q: "\"...هل ما يمكنني أن أستخدم التحميل الجانبي طوال الوقت إذا استخدمت التدفق المتقدم؟\""
 obj_sideloading_a: "تسع خطوات، انتظار لمدة 24 ساعة، مدفون في خيارات المطور، يتم تسليمه عبر خدمة مملوكة يمكن لجوجل إلغاؤها متى شاءت. هذا ليس تثبيتًا جانبيًا. هذا **آلية رادعة** مصممة لضمان أن لا يكملها أحد تقريبًا. ولأنها تعمل عبر خدمات Play بدلاً من نظام التشغيل، يمكن لجوجل تشديدها أو إلغاؤها بصمت."
# obj_hide_q: "\"...only a problem if you have something to hide?\""
# obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distribute or use software without putting their legal identity in a Google database. Anonymous open-source contribution is a tradition older than Google itself. This policy ends it on Android."
# obj_apple_q: "\"...the same thing Apple does?\""
# obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. "Apple does it too" is a race to the bottom and a weak *tu quoque* argument. And under regulatory pressure (the EU's Digital Markets Act), even Apple is being forced to open up. Google is moving in the opposite direction: attempting to further entrench its gatekeeping status."
# obj_cost_q: "\"...just $25 and some paperwork?\""
# obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health app. The cost isn't only financial: you're surrendering government ID and evidence of your signing keys to a company that [routinely complies](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) with government demands to remove apps and expose developers."

